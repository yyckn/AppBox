<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppBox</title>
    <link rel="icon" type="image/x-icon" href="https://timp.rth1.xyz/photo/defult.ico">
    <style>
        body {
            font-family: 'MiSans VF', 'MiSans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        :root {
            --primary: #0067c0;
            --bg-color: #f7f7f7;
            --sidebar-bg: #f3f3f3;
            --text: #000000;
            --text-main: #333333;
            --text-muted: #676767;
            --border-color: #e7e7e7;
            --card-border-color: #e5e5e5;
            --danger: #f02525;
            --main-text: #000000;
            --card-bg: #ffffff;
            --element-bg: #ececec;
            --element-bg-hover: #ffffff;
            --element-border-hover: #e7e7e7;
            --border-bottom: #969b9a;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #4cc2ff;
                --bg-color: #2d2d2d;
                --sidebar-bg: #202020;
                --text: #ffffff;
                --text-main: #ffffff;
                --text-muted: #bdbdbd;
                --border-color: #252525;
                --card-border-color: #252525;
                --danger: #f46762;
                --main-text: #ffffff;
                --card-bg: #202020;
                --element-bg: #323232;
                --element-bg-hover: #1e1e1e;
                --element-border-hover: #353535;
                --border-bottom: #a1a2a2;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe Fluent Icons', 'MiSans VF', 'MiSans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        body { display: flex; height: 100vh; background-color: var(--bg-color); color: var(--text-main); }
        
        /* 侧边栏 */
        .sidebar { width: 320px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 15px 0 15px; flex-shrink: 0; z-index: 20; }
        .logo { font-size: 18px; font-weight: 500; color: var(--main-text); margin-bottom: 20px; text-align: left; cursor: pointer; }
        .search-box { margin-bottom: 10px; }
        .search-box input { width: 100%; padding: 0px 12px; line-height: 34px; border: 1px solid var(--border-color); border-bottom: 1px solid var(--border-bottom); border-radius: 4px; outline: none; background-color: var(--element-bg); color: var(--text); }
        .search-box input:focus { border: 1px solid var(--element-border-hover); border-bottom: 2px solid var(--primary); padding-bottom: -1px; background-color: var(--element-bg-hover); }
        .search-box input:hover { background-color: var(--element-bg-hover); }
        
        /* 导航栏与动画胶囊指示器 */
        .nav-container { 
            position: relative; 
            flex-grow: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            margin-right: -5px; 
            padding-right: 5px; 
        }
        .nav-indicator {
            position: absolute;
            left: 0px;
            top: 0;
            width: 4px;
            height: 16px;
            background-color: var(--primary);
            border-radius: 4px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.2s;
            pointer-events: none;
            z-index: 10;
        }
        .nav-btn { 
            display: block; 
            width: 100%;
            height: 36px;
            padding: 10px 10px 10px 12px;
            margin-bottom: 4px; 
            background-color: #00000000;
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            font-size: 14px; 
            color: var(--text-main);
            transition: background-color 0.2s; 
            position: relative;
        }
        .nav-btn:hover { background-color: var(--element-bg); }
        .nav-btn.active { 
            background-color: var(--element-bg);
        }
        
        /* 主内容区 */
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; position: relative; }
        .page { display: none; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 大标题样式 */
        .page-title { font-size: 24px; font-weight: 400; margin-bottom: 15px; color: var(--text-main); }

        /* 卡片网格 */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .app-card { background: var(--card-bg); border-radius: 8px; padding: 15px; border: 1px solid var(--card-border-color); display: flex; flex-direction: column; align-items: center; text-align: center; transition: transform 0.2s; cursor: pointer; }
        .app-card:hover { transform: translateY(-3px);}
        .app-icon { width: 64px; height: 64px; border-radius: 10px; margin-bottom: 8px; object-fit: cover; }
        .app-name { font-size: 16px; font-weight: 500; margin-bottom: 5px; }
        .app-type { font-size: 12px; color: var(--primary); background: #e0f2fe; padding: 2px 8px; border-radius: 12px; margin-bottom: 10px; }
        .app-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .app-tag { font-size: 12px; background: var(--element-bg); color: var(--text-muted); padding: 2px 8px; border-radius: 5px; display: inline-block; }

        /* 设置 & 列表管理 */
        .settings-section { padding: 0px; margin-bottom: 15px;}
        .settings-section h2 { font-size: 15px; padding-bottom: 10px; font-weight: 500; }
        .btn { height: 36px; min-width: 36px; padding: 0 10px; border: none; border-radius: 5px; cursor: pointer; color: var(--text); background-color: var(--primary); transition: opacity 0.2s; margin-right: 10px; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-secondary { background-color: var(--card-bg); border: 1px solid var(--border-color); }
        .btn-small { padding: 4px 8px; font-size: 12px; }
        .manage-list { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        .manage-list th { background: var(--sidebar-bg); font-weight: 600; }
        .manage-list th, .manage-list td { text-align: left; padding: 12px 15px; border-bottom: 1px solid var(--border-color); }
        .manage-list tr:last-child td { border-bottom: none; }
        .manage-list img { width: 32px; height: 32px; border-radius: 6px; vertical-align: middle; margin-right: 10px; object-fit: cover; }

        /* 表单页面样式 */
        .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 5px; }
        .form-container { display: flex; flex-direction: column; gap: 20px; max-width: 900px; margin: 0 auto; }
        .form-group { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--card-border-color); }
        .form-label { display: flex; justify-content: space-between; align-items: center; font-weight: 500; margin-bottom: 10px; font-size: 14px; color: var(--text); }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-bottom: 1px solid var(--border-bottom); border-radius: 4px; outline: none; font-size: 14px; background-color: var(--element-bg); color: var(--text);}
        .form-control:focus { border: 1px solid var(--element-border-hover); border-bottom: 2px solid var(--primary); padding-bottom: -1px; background-color: var(--element-bg-hover); }
        .form-control:hover { background-color: var(--element-bg-hover); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        
        .dynamic-list { display: flex; flex-direction: column; gap: 8px; }
        .dynamic-item { display: flex; gap: 10px; align-items: center; }
        .dynamic-item input[type="text"] { flex-grow: 1; }
        
        .multi-col-grid { display: grid; gap: 8px; align-items: center; }
        .grid-downloads { grid-template-columns: 1fr 1fr 1.5fr 1fr 2fr auto; }
        .grid-reqs { grid-template-columns: 1fr 3fr auto; }
        .grid-misc { grid-template-columns: 1fr 3fr auto; }

        /* 横幅海报相关样式 */
        .banner-container { position: absolute; top: -30px; left: 0px; width: 100%; height: 500px; z-index: 0; overflow: hidden; pointer-events: none; }
        .banner-layer-1 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .banner-layer-2 { position: absolute; height: 100%; z-index: 2; left: 50%; transform: translateX(-50%); }
        .banner-img { height: 500px; width: auto; max-width: none; display: block; }
        .banner-grad-left { position: absolute; left: 0; top: 0; bottom: 0; width: 50px; z-index: 3; }
        .banner-grad-right { position: absolute; right: 0; top: 0; bottom: 0; width: 50px; z-index: 3; }
        .banner-layer-4 { position: absolute; top: 0; left: 0; width: 100%; height: 500px; z-index: 4; background: linear-gradient(to bottom, #00000000 0%, #00000000 150px, var(--bg-color) 500px); }
        
        /* 详情页样式 */
        .details-container { background: transparent; padding: 0; position: relative; max-width: 1000px; margin: 0 auto; z-index: 10; transition: margin-top 0.3s; }
        .details-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .details-top-card { display: flex; gap: 30px; margin-bottom: 20px; position: relative; }
        .details-logo { width: 120px; height: 120px; border-radius: 20px; object-fit: cover; background-color: var(--bg-color); }
        .details-info { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .details-title { font-size: 28px; font-weight: 500; color: var(--text-main); margin: 0; }
        .details-author { font-size: 13px; color: var(--text-muted); cursor: pointer; text-decoration: none; margin-bottom: 5px; }
        .details-author:hover { color: var(--primary); text-decoration: underline; }
        
        .details-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 2px; }
        .details-label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
        
        .dl-btn { padding: 0px 16px; height: 32px; border-radius: 0px 5px 5px 0px; text-decoration: none; color: white; font-weight: bold; font-size: 13px; transition: opacity 0.2s; display: inline-flex; align-items: center; gap: 5px; pointer-events: auto; }
        .dl-btn:hover { opacity: 0.8; }
        .dl-plat-label { font-weight: 500; color: var(--text-muted); min-width: 80px; }
        
        .detail-card { margin-bottom: 5px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; pointer-events: auto; }
        .detail-card-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 15px; font-weight: 500; color: var(--text-main); background: var(--card-bg); border-top-left-radius: 10px; border-top-right-radius: 10px; }
        .detail-card-body { padding: 15px; background: var(--card-bg); border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; font-size: 11px;}
        
        .details-desc { font-size: 13px; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
        .details-media { display: flex; flex-wrap: nowrap; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .media-item { flex-shrink: 0; max-width: 100%; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .media-link { display: inline-block; padding: 10px 15px; background: #f3f4f6; border-radius: 6px; color: var(--primary); text-decoration: none; }
        
        .req-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .req-table td { padding: 10px 12px; border: 1px solid var(--border-color); }
        .req-table td:first-child { background: var(--card-bg); font-weight: bold; width: 150px; color: var(--text-muted); }

        /* 模态框 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--card-bg); padding: 25px; border-radius: 8px; width: 400px; text-align: center; }
        .modal .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo" onclick="handleNavClick('all')">AppBox</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="在此输入应用名称开始搜索" oninput="filterApps()">
        </div>
        
        <div class="nav-container" id="navContainer">
            <div id="navIndicator" class="nav-indicator"></div>
            <div id="navButtons"></div>
        </div>
    </aside>

    <main class="main-content">
        <div id="page-home" class="page active">
            <h1 class="page-title" id="homeTitle">全部类型</h1>
            <div class="app-grid" id="appGrid"></div>
        </div>

        <div id="page-collections" class="page">
            <h1 class="page-title">所有合集</h1>
            <div class="app-grid" id="collectionGrid"></div>
        </div>

        <div id="page-details" class="page">
            <div id="bannerContainer" class="banner-container" style="display: none;"></div>
            <div class="details-container" id="detailsContainer"></div>
        </div>

        <div id="page-settings" class="page">
            <h1 class="page-title">设置</h1>
            <div class="settings-section">
                <h2>数据管理</h2>
                <input type="file" id="fileInput" accept=".json" onchange="handleFileSelect(event)">
                <button class="btn" id="toggleCustomSourceBtn" onclick="toggleCustomDataSource()">启用自定义数据源</button>
                <span id="customSourceActions" style="display: none;">
                    <button class="btn" onclick="document.getElementById('fileInput').click()">导入JSON文件</button>
                    <button class="btn btn-secondary" onclick="exportData()">导出为JSON文件</button>
                </span>
            </div>
            
            <div class="settings-section" id="manageAppListSection" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 style="margin: 0; border: none; padding: 0;">软件列表</h2>
                    <button class="btn" style="margin: 0;" onclick="openAppForm()">新增软件</button>
                </div>
                <table class="manage-list">
                    <thead><tr><th>图标与名称</th><th>类型</th><th>作者</th><th>操作</th></tr></thead>
                    <tbody id="manageTableBody"></tbody>
                </table>
            </div>

            <div class="settings-section" id="manageCollectionSection" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                    <h2 style="margin: 0; border: none; padding: 0;">合集列表</h2>
                    <button class="btn" style="margin: 0;" onclick="openCollectionForm()">新增合集</button>
                </div>
                <table class="manage-list">
                    <thead><tr><th>合集标题</th><th>合集介绍</th><th>操作</th></tr></thead>
                    <tbody id="manageCollectionTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="page-form" class="page">
            <div class="settings-section">
                <div class="form-header">
                    <h2 class="page-title" id="formTitle" style="margin:0; border:none; padding:0;">新增软件</h2>
                    <div>
                        <button class="btn btn-secondary" onclick="cancelForm()">取消</button>
                        <button class="btn" style="margin-right: 0;" onclick="saveAppForm()">保存数据</button>
                    </div>
                </div>

                <div class="form-container">
                    <div class="form-group"><div class="form-label">应用名称（必填）</div><input type="text" id="f-name" class="form-control" placeholder="如：哔哩哔哩"></div>
                    <div class="form-group"><div class="form-label">软件作者（必填）</div><input type="text" id="f-author" class="form-control" placeholder="如：独立开发者 / 公司名称"></div>
                    <div class="form-group"><div class="form-label">类型（必填）</div><input type="text" id="f-type" class="form-control" placeholder="应用/游戏/网页插件/office插件"></div>
                    <div class="form-group"><div class="form-label">LOGO</div><input type="text" id="f-logo" class="form-control" placeholder="请填写以https://开头的图片链接"></div>
                    
                    <div class="form-group">
                        <div class="form-label">横幅海报</div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <input type="text" id="f-banner-color" class="form-control" style="width: 120px;" placeholder="填写颜色，如: #0067c0">
                            <input type="text" id="f-banner-url" class="form-control" placeholder="海报图片链接，如: https://...">
                        </div>
                    </div>

                    <div class="form-group"><div class="form-label">介绍</div><textarea id="f-desc" class="form-control" placeholder="简单介绍一下这个应用"></textarea></div>
                    
                    <div class="form-group">
                        <div class="form-label">介绍视频/图片<button class="btn btn-small" style="margin-right: 0;" onclick="addMediaItem()">&#xE710;</button></div>
                        <div id="list-media" class="dynamic-list"></div>
                    </div>

                    <div class="form-group">
                        <div class="form-label">支持平台</div>
                        <input type="text" id="f-platforms" class="form-control" placeholder="多个平台请用逗号分隔，如: Windows, Linux">
                    </div>

                    <div class="form-group">
                        <div class="form-label">分组</div>
                        <input type="text" id="f-groupTags" class="form-control" placeholder="多个请用逗号分隔，如: 音乐, 工具">
                    </div>

                    <div class="form-group">
                        <div class="form-label">标签</div>
                        <input type="text" id="f-featureTags" class="form-control" placeholder="多个请用逗号分隔，如: 开源, 便携版">
                    </div>

                    <div class="form-group">
                        <div class="form-label">安装要求 <button class="btn btn-small" style="margin-right: 0;" onclick="addReqItem()">&#xE710;</button></div>
                        <div id="list-reqs" class="dynamic-list"></div>
                    </div>

                    <div class="form-group">
                        <div class="form-label">下载链接<button class="btn btn-small" style="margin-right: 0;" onclick="addDownloadItem()">&#xE710;</button></div>
                        <div id="list-downloads" class="dynamic-list"></div>
                    </div>

                    <div class="form-group">
                        <div class="form-label">杂项<button class="btn btn-small" style="margin-right: 0;" onclick="addMiscItem()">&#xE710;</button></div>
                        <div id="list-misc" class="dynamic-list"></div>
                    </div>
                    
                    <div class="form-group">
                        <div class="form-label">相关应用<button class="btn btn-small" style="margin-right: 0;" onclick="addDynamicItem('list-related', '', '如: 哔哩哔哩概念版')">&#xE710;</button></div>
                        <div id="list-related" class="dynamic-list"></div>
                    </div>

                    <div class="form-group">
                        <div class="form-label">使用教程</div>
                        <textarea id="f-tutorial" class="form-control" placeholder="填写该应用的使用教程..."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-collection-form" class="page">
            <div class="settings-section">
                <div class="form-header">
                    <h2 class="page-title" id="colFormTitle" style="margin:0; border:none; padding:0;">新增合集</h2>
                    <div>
                        <button class="btn btn-secondary" onclick="cancelCollectionForm()">取消</button>
                        <button class="btn" style="margin-right: 0;" onclick="saveCollectionForm()">保存数据</button>
                    </div>
                </div>
                <div class="form-container">
                    <div class="form-group"><div class="form-label">列表标题（必填）</div><input type="text" id="fc-title" class="form-control" placeholder="输入合集标题"></div>
                    <div class="form-group"><div class="form-label">列表介绍</div><textarea id="fc-desc" class="form-control" placeholder="简单介绍一下这个合集"></textarea></div>
                    <div class="form-group"><div class="form-label">列表应用</div><input type="text" id="fc-apps" class="form-control" placeholder="多个应用名称请用逗号分隔，如：微信, QQ"></div>
                </div>
            </div>
        </div>

    </main>

    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <h3>检测到 JSON 数据</h3>
            <p>请选择导入方式：</p>
            <div class="btn-group">
                <button class="btn" onclick="executeImport('overwrite')">覆盖原有</button>
                <button class="btn" onclick="executeImport('merge')">合并数据</button>
                <button class="btn btn-secondary" style="margin-right: 0;" onclick="closeModal('importModal')">取消</button>
            </div>
        </div>
    </div>

    <script>
        let appData = [];
        let collectionData = JSON.parse(localStorage.getItem('appbox_collections')) || []; 
        let isCustomDataSource = localStorage.getItem('appbox_custom_source') === 'true'; 
        let currentImportData = null;
        let currentNav = 'all'; 
        let currentAuthorFilter = null; 
        let currentCollectionFilter = null; 
        let currentEditingIndex = null;
        let currentCollectionEditingIndex = null;
        let previousPage = 'home'; 

        async function init() {
            await loadData();
            updateUIForCustomSource();
            renderSidebarTypes();
            
            const hash = window.location.hash;
            if (hash) {
                const targetAppName = decodeURIComponent(hash.substring(1));
                const targetIndex = appData.findIndex(app => app.name === targetAppName);
                
                if (targetIndex !== -1) {
                    handleNavClick('all');
                    showAppDetails(targetIndex);
                    return; 
                }
            }
            
            handleNavClick('all');
        }

        async function loadData() {
            if (isCustomDataSource) {
                appData = JSON.parse(localStorage.getItem('appbox_data')) || [];
            } else {
                try {
                    const response = await fetch('AppBox_Data.json');
                    if (!response.ok) throw new Error(`HTTP 错误! 状态码: ${response.status}`);
                    const fetched = await response.json();
                    
                    if (Array.isArray(fetched)) {
                        appData = fetched;
                    } else if (fetched.apps && Array.isArray(fetched.apps)) {
                        appData = fetched.apps;
                        if (fetched.collections) collectionData = fetched.collections;
                    } else {
                        appData = [];
                    }
                } catch (error) {
                    console.error("加载内置数据源失败:", error);
                    alert("加载内置数据源失败，请检查网络连接。");
                    appData = [];
                }
            }
        }

        async function toggleCustomDataSource() {
            isCustomDataSource = !isCustomDataSource;
            localStorage.setItem('appbox_custom_source', isCustomDataSource);
            
            await loadData();
            updateUIForCustomSource();
            renderSidebarTypes();
            
            if (currentNav === 'settings') {
                switchPage('settings'); 
            } else {
                filterApps(); 
            }
        }

        function updateUIForCustomSource() {
            const btn = document.getElementById('toggleCustomSourceBtn');
            const extraActions = document.getElementById('customSourceActions');
            const manageSection = document.getElementById('manageAppListSection');
            const manageColSection = document.getElementById('manageCollectionSection');
            
            if (isCustomDataSource) {
                btn.innerText = '关闭自定义数据源';
                extraActions.style.display = 'inline-block';
                manageSection.style.display = 'block';
                manageColSection.style.display = 'block';
            } else {
                btn.innerText = '启用自定义数据源';
                extraActions.style.display = 'none';
                manageSection.style.display = 'none';
                manageColSection.style.display = 'none';
            }
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if(pageId === 'settings') {
                renderManageList(); 
                renderCollectionManageList();
            }
            if(pageId === 'home') { previousPage = 'home'; renderAppGrid(); }
        }

        function renderSidebarTypes() {
            const navButtons = document.getElementById('navButtons');
            const types = [...new Set(appData.map(app => app.type || '未分类'))];
            
            let html = `
                <button class="nav-btn ${currentNav === 'all' ? 'active' : ''}" onclick="handleNavClick('all', this)">&#xE71D;&nbsp;&nbsp;全部类型&nbsp;&nbsp;&#xE70D;</button>
            `;
            types.forEach(type => { 
                if(type !== '未分类' && type.trim() !== '') {
                    html += `<button class="nav-btn ${currentNav === type ? 'active' : ''}" onclick="handleNavClick('${type}', this)">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${type}</button>`; 
                }
            });
            html += `<button class="nav-btn ${currentNav === 'collections' ? 'active' : ''}" onclick="handleNavClick('collections', this)">&#xE8F1;&nbsp;&nbsp;合集</button>`;
            html += `<button class="nav-btn ${currentNav === 'settings' ? 'active' : ''}" onclick="handleNavClick('settings', this)">&#xE713;&nbsp;&nbsp;设置</button>`;
            
            navButtons.innerHTML = html;
            setTimeout(moveIndicator, 50);
        }

        function handleNavClick(target, btnElement = null) {
            currentNav = target;
            currentAuthorFilter = null; 
            currentCollectionFilter = null;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            if (!btnElement) {
                btnElement = document.querySelector(`button[onclick*="'${target}'"]`);
            }
            if (btnElement) {
                btnElement.classList.add('active');
            }
            
            moveIndicator();

            if (target === 'settings') {
                switchPage('settings');
            } else if (target === 'collections') {
                switchPage('collections');
                renderCollectionGrid();
            } else {
                document.getElementById('searchInput').value = ''; 
                switchPage('home'); 
            }
        }

        function filterByAuthor(author) {
            currentAuthorFilter = author;
            currentNav = 'author_filter'; 
            currentCollectionFilter = null;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            moveIndicator();
            
            document.getElementById('searchInput').value = ''; 
            switchPage('home');
        }

        function filterByCollection(index) {
            currentCollectionFilter = index;
            currentNav = 'collection_view';
            currentAuthorFilter = null;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            moveIndicator();
            
            document.getElementById('searchInput').value = ''; 
            switchPage('home');
        }

        function moveIndicator() {
            const activeBtn = document.querySelector('.nav-btn.active');
            const indicator = document.getElementById('navIndicator');
            
            if (activeBtn && indicator) {
                const topPos = activeBtn.offsetTop + (activeBtn.offsetHeight - 16) / 2;
                indicator.style.transform = `translateY(${topPos}px)`;
                indicator.style.opacity = '1';
            } else if (indicator) {
                indicator.style.opacity = '0';
            }
        }

        function filterApps() {
            switchPage('home');
            renderAppGrid();
        }

        function renderAppGrid() {
            const grid = document.getElementById('appGrid');
            const homeTitle = document.getElementById('homeTitle');
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';
            
            if (currentAuthorFilter) {
                homeTitle.innerText = `由 ${currentAuthorFilter} 开发的所有应用`;
            } else if (currentCollectionFilter !== null) {
                homeTitle.innerText = `合集：${collectionData[currentCollectionFilter].title}`;
            } else if (currentNav === 'all' || currentNav === 'settings') {
                homeTitle.innerText = `全部类型`;
            } else {
                homeTitle.innerText = currentNav;
            }

            let filteredApps = appData.map((app, index) => ({...app, _originalIndex: index})) 
                .filter(app => {
                    let match = true;
                    if (currentAuthorFilter) {
                        match = match && (app.author === currentAuthorFilter);
                    } else if (currentCollectionFilter !== null) {
                        const colApps = collectionData[currentCollectionFilter].apps || [];
                        match = match && colApps.includes(app.name);
                    } else {
                        match = match && (currentNav === 'all' || currentNav === 'settings' || currentNav === 'collections' || app.type === currentNav);
                    }
                    const matchSearch = app.name.toLowerCase().includes(keyword) || (app.description && app.description.toLowerCase().includes(keyword));
                    return match && matchSearch;
                });

            if(filteredApps.length === 0) { grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; margin-top: 50px;">暂无应用。</p>'; return; }

            filteredApps.forEach(app => {
                const tagsHtml = (app.groupTags || []).map(tag => `<span class="app-tag">${tag}</span>`).join('');
                const card = document.createElement('div');
                card.className = 'app-card';
                card.onclick = () => showAppDetails(app._originalIndex);
                card.innerHTML = `
                    <img src="${app.logo || 'https://appbox.rth1.xyz/logo/application.png'}" class="app-icon" onerror="this.src='https://appbox.rth1.xyz/logo/application.png'">
                    <div class="app-name">${app.name || '未知应用'}</div>
                    <div class="app-type">${app.type || '未分类'}</div>
                    <div class="app-tags">${tagsHtml}</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderCollectionGrid() {
            const grid = document.getElementById('collectionGrid');
            grid.innerHTML = '';
            if(collectionData.length === 0) { grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; margin-top: 50px;">暂无合集数据。</p>'; return; }
            collectionData.forEach((col, index) => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.onclick = () => filterByCollection(index);
                card.innerHTML = `
                    <div style="width: 64px; height: 64px; border-radius: 10px; margin-bottom: 8px; background: var(--element-bg); display:flex; align-items:center; justify-content:center; font-size: 32px; color: var(--primary);">&#xE8F1;</div>
                    <div class="app-name">${col.title}</div>
                    <div class="app-tags" style="margin-top: 5px;"><span class="app-tag">${(col.apps||[]).length} 个应用</span></div>
                    <div class="app-type" style="color:var(--text-muted); background:transparent; margin-top:5px; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%;">${col.description || ''}</div>
                `;
                grid.appendChild(card);
            });
        }

        function showAppDetails(index) {
            previousPage = 'details'; 
            const app = appData[index];
            const container = document.getElementById('detailsContainer');
            const bannerContainer = document.getElementById('bannerContainer');
            
            if (app.bannerUrl) {
                const themeColor = app.bannerColor || '#0067c0';
                bannerContainer.innerHTML = `
                    <div class="banner-layer-1" style="background-color: ${themeColor};"></div>
                    <div class="banner-layer-2">
                        <img src="${app.bannerUrl}" class="banner-img">
                        <div class="banner-grad-left" style="background: linear-gradient(to right, ${themeColor}, #00000000);"></div>
                        <div class="banner-grad-right" style="background: linear-gradient(to left, ${themeColor}, #00000000);"></div>
                    </div>
                    <div class="banner-layer-4"></div>
                `;
                bannerContainer.style.display = 'block';
                container.style.marginTop = '250px'; 
            } else {
                bannerContainer.innerHTML = '';
                bannerContainer.style.display = 'none';
                container.style.marginTop = '0';
            }

            let combinedTagsHtml = '';
            combinedTagsHtml += `<span class="app-tag" style="background: var(--card-bg); color:var(--text-muted);">${app.type}</span>`;
            
            if (app.groupTags && app.groupTags.length > 0) {
                app.groupTags.forEach(t => {
                    combinedTagsHtml += `<span class="app-tag" style="background: var(--card-bg); color:var(--text-muted);">${t}</span>`;
                });
            }
            if (app.featureTags && app.featureTags.length > 0) {
                app.featureTags.forEach(t => {
                    combinedTagsHtml += `<span class="app-tag" style="background:#e0f2fe; color:var(--primary);">${t}</span>`;
                });
            }
            
            let platHtml = '';
            if (app.platforms && app.platforms.length > 0) {
                app.platforms.forEach(p => {
                    platHtml += `<span class="app-tag" style="font-size: 12px; font-weight: normal; background: var(--element-bg); color:var(--text-muted);">${p}</span>`;
                });
            }
            
            let dlHtml = '';
            const dlGroups = {};
            (app.downloads || []).forEach(dlStr => {
                const parts = dlStr.split(',');
                let plat = (parts[0] || '').trim() || '下载链接：';
                const groupKey = plat.toLowerCase();
                if (!dlGroups[groupKey]) dlGroups[groupKey] = { displayName: plat, items: [] };
                dlGroups[groupKey].items.push({ 
                    ver: (parts[1] || '').trim(), text: (parts[2] || '').trim(), 
                    color: (parts[3] || '').trim(), link: (parts.slice(4).join(',') || '#').trim() 
                });
            });

            if (Object.keys(dlGroups).length > 0) {
                dlHtml = '<div style="display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 5px;">';
                Object.keys(dlGroups).forEach(key => {
                    const group = dlGroups[key];
                    let buttonsHtml = '';
                    group.items.forEach((item) => {
                        buttonsHtml += `
                            <div style="display: inline-flex; align-items: center; margin-right: 15px;">
                                ${item.ver ? `<span class="app-tag" style="background: #dcdcdc; color: #4b5563; padding: 0px 8px; height: 32px; line-height: 32px; border-radius: 5px 0px 0px 5px;">${item.ver}</span>` : ''}
                                <a href="${item.link}" target="_blank" class="dl-btn" style="background-color: ${item.color}; border-radius: ${item.ver ? '0px 5px 5px 0px' : '5px'};">
                                    &#xE896; ${item.text}
                                </a>
                            </div>`;
                    });
                    dlHtml += `<div style="display: flex; align-items: center; flex-wrap: wrap; "><span class="dl-plat-label">${group.displayName}&nbsp;&nbsp;</span>${buttonsHtml}</div>`;
                });
                dlHtml += '</div>';
            }

            let bodyCardsHtml = '';
            
            if (app.description) {
                bodyCardsHtml += `
                    <div class="detail-card">
                        <div class="detail-card-header">软件介绍</div>
                        <div class="detail-card-body"><div class="details-desc">${app.description}</div></div>
                    </div>`;
            }

            let parsedMedia = (app.media || []).map(mStr => {
                const parts = mStr.split(',');
                return {
                    type: parts[0].trim().toLowerCase(),
                    url: parts.slice(1).join(',').trim()
                };
            }).filter(m => m.url);

            parsedMedia.sort((a, b) => {
                const isAMediaFirst = (a.type === 'video' || a.type === 'iframe') ? 0 : 1;
                const isBMediaFirst = (b.type === 'video' || b.type === 'iframe') ? 0 : 1;
                return isAMediaFirst - isBMediaFirst;
            });

            let mediaHtml = '';
            parsedMedia.forEach(m => {
                if (m.type === 'image') {
                    mediaHtml += `<img src="${m.url}" class="media-item" style="max-height: 300px;" onerror="this.style.display='none'">`;
                }
                else if (m.type === 'iframe') {
                    mediaHtml += `<iframe src="${m.url}" class="media-item" style="border:none; height: 300px; width: 500px; max-width: 100%;" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>`;
                }
                else if (m.type === 'video') {
                    mediaHtml += `<video src="${m.url}" class="media-item" style="max-height: 300px; width: auto;" controls muted></video>`;
                }
                else {
                    mediaHtml += `<a href="${m.url}" target="_blank" class="media-link media-item" style="display:flex; align-items:center; height: 40px;">🔗 访问媒体链接</a>`;
                }
            });
            
            if (mediaHtml) {
                bodyCardsHtml += `
                    <div class="detail-card">
                        <div class="detail-card-header">使用界面</div>
                        <div class="detail-card-body"><div class="details-media">${mediaHtml}</div></div>
                    </div>`;
            }

            if (app.requirements && app.requirements.length > 0) {
                let reqHtml = `<table class="req-table"><tbody>`;
                app.requirements.forEach(req => {
                    const parts = req.split(',');
                    reqHtml += `<tr><td>${parts[0]||'未知要求'}</td><td>${parts.slice(1).join(',')||'-'}</td></tr>`;
                });
                reqHtml += `</tbody></table>`;
                bodyCardsHtml += `
                    <div class="detail-card">
                        <div class="detail-card-header">安装要求</div>
                        <div class="detail-card-body">${reqHtml}</div>
                    </div>`;
            }

            if (app.misc && app.misc.length > 0) {
                let miscHtml = `<table class="req-table"><tbody>`;
                app.misc.forEach(m => {
                    const parts = m.split(',');
                    let title = parts[0] || '其他';
                    let content = parts.slice(1).join(',') || '-';
                    if(content.startsWith('http')) content = `<a href="${content}" target="_blank" style="color: var(--primary); text-decoration: none;">${content}</a>`;
                    miscHtml += `<tr><td>${title}</td><td>${content}</td></tr>`;
                });
                miscHtml += `</tbody></table>`;
                bodyCardsHtml += `
                    <div class="detail-card">
                        <div class="detail-card-header">其他信息</div>
                        <div class="detail-card-body">${miscHtml}</div>
                    </div>`;
            }

            if (app.relatedApps && app.relatedApps.length > 0) {
                let relatedCardsHtml = '';
                app.relatedApps.forEach(rAppName => {
                    const rIndex = appData.findIndex(a => a.name === rAppName);
                    if(rIndex !== -1) {
                        const rApp = appData[rIndex];
                        const rTagsHtml = (rApp.groupTags || []).map(tag => `<span class="app-tag">${tag}</span>`).join('');
                        relatedCardsHtml += `
                            <div class="app-card" style="cursor: pointer; background: var(--bg-color); box-shadow: none;" onclick="showAppDetails(${rIndex})">
                                <img src="${rApp.logo || 'https://appbox.rth1.xyz/logo/application.png'}" class="app-icon" onerror="this.src='https://appbox.rth1.xyz/logo/application.png'">
                                <div class="app-name">${rApp.name || '未知'}</div>
                                <div class="app-type">${rApp.type || '未分类'}</div>
                                <div class="app-tags">${rTagsHtml}</div>
                            </div>`;
                    }
                });
                if(relatedCardsHtml) {
                    bodyCardsHtml += `
                        <div class="detail-card">
                            <div class="detail-card-header">相关应用</div>
                            <div class="detail-card-body"><div class="app-grid">${relatedCardsHtml}</div></div>
                        </div>`;
                }
            }

            if (app.tutorial) {
                bodyCardsHtml += `
                    <div class="detail-card">
                        <div class="detail-card-header">使用教程</div>
                        <div class="detail-card-body"><div class="details-desc">${app.tutorial}</div></div>
                    </div>`;
            }

            const editBtnHtml = isCustomDataSource ? `<button class="btn" style="margin: 0; pointer-events: auto;" onclick="openAppForm(${index})">&#xE70F; 编辑信息</button>` : '';

            container.innerHTML = `
                <div class="details-actions">
                    <button class="btn btn-secondary" style="margin: 0; pointer-events: auto;" onclick="switchPage('home')">&#xE72B;</button>
                    ${editBtnHtml}
                </div>
                
                <div class="details-top-card">
                    <img src="${app.logo || 'https://appbox.rth1.xyz/logo/application.png'}" class="details-logo" onerror="this.src='https://appbox.rth1.xyz/logo/application.png'">
                    <div class="details-info">
                        <h1 class="details-title">${app.name}</h1>
                        <div class="details-author" style="pointer-events: auto;" onclick="filterByAuthor('${app.author || ''}')">${app.author || '未知'}</div>
                        <div class="details-row">${combinedTagsHtml}</div>
                        ${platHtml ? `<div class="details-row"><div class="details-label">适用于</div>${platHtml}</div>` : ''}
                        ${dlHtml ? `<div class="details-row" style="align-items: flex-start;">${dlHtml}</div>` : ''}
                    </div>
                </div>
                
                ${bodyCardsHtml}
            `;
            
            switchPage('details');
        }

        function addDynamicItem(containerId, value = '', placeholder = '') {
            const container = document.getElementById(containerId);
            const div = document.createElement('div');
            div.className = 'dynamic-item';
            div.innerHTML = `<input type="text" class="form-control" value="${value}" placeholder="${placeholder}"><button class="btn btn-danger btn-small" style="margin-right: 0;" onclick="this.parentElement.remove()">&#xE894;</button>`;
            container.appendChild(div);
        }

        function addMediaItem(type = 'image', url = '') {
            const container = document.getElementById('list-media');
            const div = document.createElement('div');
            div.className = 'dynamic-item';
            div.innerHTML = `
                <select class="form-control" style="width: auto; flex-shrink: 0;">
                    <option value="image" ${type === 'image' ? 'selected' : ''}>图片</option>
                    <option value="video" ${type === 'video' ? 'selected' : ''}>视频</option>
                    <option value="iframe" ${type === 'iframe' ? 'selected' : ''}>iframe</option>
                </select>
                <input type="text" class="form-control" value="${url}" placeholder="请输入链接">
                <button class="btn btn-danger btn-small" style="margin-right: 0;" onclick="this.parentElement.remove()">&#xE894;</button>
            `;
            container.appendChild(div);
        }

            div.className = 'dynamic-item multi-col-grid grid-downloads';

                <input type="text" class="form-control dl-ver" value="${ver}" placeholder="版本 (如 x64)">
                <input type="text" class="form-control dl-text" value="${text}" placeholder="按钮文字">

                <button class="btn btn-danger btn-small" style="margin-right: 0;" onclick="this.parentElement.remove()">&#xE894;</button>
            `;
            container.appendChild(div);
        }

        function addReqItem(label='', content='') {
            const container = document.getElementById('list-reqs');
            const div = document.createElement('div');

            div.innerHTML = `
                <input type="text" class="form-control req-label" value="${label}" placeholder="标签 (如 gpu)">

            const div = document.createElement('div');
            div.className = 'dynamic-item multi-col-grid grid-misc';
            div.innerHTML = `
                <input type="text" class="form-control misc-title" value="${title}" placeholder="标题 (如 官方教程)">
                <input type="text" class="form-control misc-content" value="${content}" placeholder="内容">
                <button class="btn btn-danger btn-small" style="margin-right: 0;" onclick="this.parentElement.remove()">&#xE894;</button>
            `;
            container.appendChild(div);
        }

        function getDynamicValues(containerId) {
            return Array.from(document.getElementById(containerId).querySelectorAll('input[type="text"]')).map(input => input.value.trim()).filter(val => val !== '');
        }

        function getMediaData() {
            return Array.from(document.querySelectorAll('#list-media .dynamic-item')).map(item => {
                const type = item.querySelector('select').value;
                const url = item.querySelector('input').value.trim();
                if(!url) return null;
                return `${type},${url}`;
            }).filter(Boolean);
        }

        function getDownloadsData() {
            return Array.from(document.querySelectorAll('#list-downloads .grid-downloads')).map(item => {
                const p = item.querySelector('.dl-plat').value.trim();
                const v = item.querySelector('.dl-ver').value.trim();
                const t = item.querySelector('.dl-text').value.trim();
                let c = item.querySelector('.dl-color').value.trim();
                const l = item.querySelector('.dl-link').value.trim();
                if(!p && !l) return null; 
                if(!c) c = '#0078D7'; 
                return `${p},${v},${t},${c},${l}`;
            }).filter(Boolean);
        }

        function getReqsData() {
            return Array.from(document.querySelectorAll('#list-reqs .grid-reqs')).map(item => {
                const label = item.querySelector('.req-label').value.trim();
                const content = item.querySelector('.req-content').value.trim();
                if(!label) return null;
                return `${label},${content}`;
            }).filter(Boolean);
        }

        function getMiscData() {
            return Array.from(document.querySelectorAll('#list-misc .grid-misc')).map(item => {
                const title = item.querySelector('.misc-title').value.trim();
                const content = item.querySelector('.misc-content').value.trim();
                if(!title && !content) return null;
                return `${title},${content}`;
            }).filter(Boolean);
        }

        function cancelForm() {
            if(previousPage === 'details' && currentEditingIndex !== null) {
                showAppDetails(currentEditingIndex);
            } else {
                switchPage('settings');
            }
        }

        function openAppForm(index = null) {
            currentEditingIndex = index;
            document.getElementById('formTitle').innerText = index === null ? '新增软件' : '编辑软件';
            if(index === null) previousPage = 'settings'; 
            
            document.getElementById('f-name').value = '';
            document.getElementById('f-author').value = '';
            document.getElementById('f-type').value = '';
            document.getElementById('f-logo').value = '';
            document.getElementById('f-banner-url').value = '';
            document.getElementById('f-banner-color').value = '#0067c0';
            document.getElementById('f-desc').value = '';
            
            document.getElementById('f-platforms').value = '';
            document.getElementById('f-groupTags').value = '';
            document.getElementById('f-featureTags').value = '';
            document.getElementById('f-tutorial').value = '';

            ['list-media', 'list-downloads', 'list-reqs', 'list-misc', 'list-related'].forEach(id => document.getElementById(id).innerHTML = '');

            if (index !== null) {
                const app = appData[index];
                document.getElementById('f-name').value = app.name || '';
                document.getElementById('f-author').value = app.author || '';
                document.getElementById('f-type').value = app.type || '';
                document.getElementById('f-logo').value = app.logo || '';
                document.getElementById('f-banner-url').value = app.bannerUrl || '';
                document.getElementById('f-banner-color').value = app.bannerColor || '#0067c0';
                document.getElementById('f-desc').value = app.description || '';
                
                document.getElementById('f-platforms').value = (app.platforms || []).join(', ');
                document.getElementById('f-groupTags').value = (app.groupTags || []).join(', ');
                document.getElementById('f-featureTags').value = (app.featureTags || []).join(', ');
                document.getElementById('f-tutorial').value = app.tutorial || '';

                (app.media || []).forEach(val => {
                    const parts = val.split(',');
                    const type = parts[0].trim().toLowerCase();
                    const url = parts.slice(1).join(',').trim();
                    addMediaItem(type, url);
                });
                
                (app.downloads || []).forEach(dl => {
                    const parts = dl.split(',');
                    addDownloadItem(parts[0]||'', parts[1]||'', parts[2]||'', parts[3]||'#0078D7', parts.slice(4).join(',')||'');
                });
                
                (app.requirements || []).forEach(req => {
                    const parts = req.split(',');
                    addReqItem(parts[0]||'', parts.slice(1).join(',')||'');
                });

                (app.misc || []).forEach(m => {
                    const parts = m.split(',');
                    addMiscItem(parts[0]||'', parts.slice(1).join(',')||'');
                });

                (app.relatedApps || []).forEach(val => addDynamicItem('list-related', val));
            }

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-form').classList.add('active');
        }

        function saveAppForm() {
            const name = document.getElementById('f-name').value.trim();
            const author = document.getElementById('f-author').value.trim();
            const type = document.getElementById('f-type').value.trim();
            
            if (!name || !author || !type) { alert("应用名称、软件作者和类型是必填项！"); return; }

            const platforms = document.getElementById('f-platforms').value.split(/[,，]/).map(s => s.trim()).filter(Boolean);
            const groupTags = document.getElementById('f-groupTags').value.split(/[,，]/).map(s => s.trim()).filter(Boolean);
            const featureTags = document.getElementById('f-featureTags').value.split(/[,，]/).map(s => s.trim()).filter(Boolean);
            const tutorial = document.getElementById('f-tutorial').value.trim();
            const bannerColor = document.getElementById('f-banner-color').value.trim() || '#0067c0';

            const newApp = {
                name: name, author: author, type: type,
                logo: document.getElementById('f-logo').value.trim(),
                bannerUrl: document.getElementById('f-banner-url').value.trim(),
                bannerColor: bannerColor,
                description: document.getElementById('f-desc').value.trim(),
                media: getMediaData(),
                platforms: platforms,
                groupTags: groupTags,
                featureTags: featureTags,
                downloads: getDownloadsData(),
                requirements: getReqsData(),
                misc: getMiscData(),
                relatedApps: getDynamicValues('list-related'),
                tutorial: tutorial
            };

            if (currentEditingIndex === null) {
                appData.push(newApp);
            } else {
                appData[currentEditingIndex] = newApp;
            }

            localStorage.setItem('appbox_data', JSON.stringify(appData));
            renderSidebarTypes(); 
            
            if (previousPage === 'details' && currentEditingIndex !== null) {
                showAppDetails(currentEditingIndex);
            } else {
                switchPage('settings');
            }
        }

        function renderManageList() {
            previousPage = 'settings';
            const tbody = document.getElementById('manageTableBody');
            tbody.innerHTML = '';
            if(appData.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999; padding: 20px;">暂无数据</td></tr>'; return; }
            appData.forEach((app, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><img src="${app.logo || 'https://appbox.rth1.xyz/logo/application.png'}" onerror="this.src='https://appbox.rth1.xyz/logo/application.png'">${app.name || '未命名'}</td>
                    <td>${app.type || '无'}</td>
                    <td>${app.author || '未知'}</td>
                    <td style="width: 160px;">
                        <button class="btn btn-small" onclick="openAppForm(${index})">&#xE70F; 编辑</button>
                        <button class="btn btn-danger btn-small" style="margin-right: 0;" onclick="deleteSoftware(${index})">&#xE894; 删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteSoftware(index) {
            if(confirm(`确定要删除软件 "${appData[index].name}" 吗？`)) {
                appData.splice(index, 1);
                localStorage.setItem('appbox_data', JSON.stringify(appData));
                renderManageList(); 
                renderSidebarTypes(); 
            }
        }

        function openCollectionForm(index = null) {
            currentCollectionEditingIndex = index;
            document.getElementById('colFormTitle').innerText = index === null ? '新增合集' : '编辑合集';
            
            document.getElementById('fc-title').value = '';
            document.getElementById('fc-desc').value = '';
            document.getElementById('fc-apps').value = '';

            if (index !== null) {
                const col = collectionData[index];
                document.getElementById('fc-title').value = col.title || '';
                document.getElementById('fc-desc').value = col.description || '';
                document.getElementById('fc-apps').value = (col.apps || []).join(', ');
            }

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-collection-form').classList.add('active');
        }

        function cancelCollectionForm() {
            switchPage('settings');
        }

        function saveCollectionForm() {
            const title = document.getElementById('fc-title').value.trim();
            if (!title) { alert("列表标题是必填项！"); return; }

            const apps = document.getElementById('fc-apps').value.split(/[,，]/).map(s => s.trim()).filter(Boolean);
            
            const newCol = {
                title: title,
                description: document.getElementById('fc-desc').value.trim(),
                apps: apps
            };

            if (currentCollectionEditingIndex === null) {
                collectionData.push(newCol);
            } else {
                collectionData[currentCollectionEditingIndex] = newCol;
            }

            localStorage.setItem('appbox_collections', JSON.stringify(collectionData));
            switchPage('settings');
        }

        function renderCollectionManageList() {
            const tbody = document.getElementById('manageCollectionTableBody');
            tbody.innerHTML = '';
            if(collectionData.length === 0) { tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999; padding: 20px;">暂无合集数据</td></tr>'; return; }
            collectionData.forEach((col, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${col.title || '未命名'}</td>
                    <td>${col.description || '无'}</td>
                    <td style="width: 160px;">
                        <button class="btn btn-small" onclick="openCollectionForm(${index})">&#xE70F; 编辑</button>
                        <button class="btn btn-danger btn-small" style="margin-right: 0;" onclick="deleteCollection(${index})">&#xE894; 删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteCollection(index) {
            if(confirm(`确定要删除合集 "${collectionData[index].title}" 吗？`)) {
                collectionData.splice(index, 1);
                localStorage.setItem('appbox_collections', JSON.stringify(collectionData));
                renderCollectionManageList(); 
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (Array.isArray(parsed)) {
                        currentImportData = { apps: parsed, collections: [] };
                    } else if (parsed.apps && Array.isArray(parsed.apps)) {
                        currentImportData = parsed;
                    } else {
                        throw new Error("Invalid format");
                    }
                    document.getElementById('importModal').style.display = 'flex';
                } catch (err) { alert("JSON 格式错误或文件损坏！"); }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        async function executeImport(mode) {
            if (mode === 'overwrite') {
                appData = currentImportData.apps || [];
                collectionData = currentImportData.collections || [];
            }
            else if (mode === 'merge') {
                appData = appData.concat(currentImportData.apps || []);
                collectionData = collectionData.concat(currentImportData.collections || []);
            }
            
            localStorage.setItem('appbox_data', JSON.stringify(appData));
            localStorage.setItem('appbox_collections', JSON.stringify(collectionData));
            closeModal('importModal'); 
            
            await loadData();
            renderSidebarTypes();
            handleNavClick('settings');
        }

        function exportData() {
            if (appData.length === 0 && collectionData.length === 0) return alert("暂无数据可导出！");
            
            const exportObj = {
                version: 2,
                apps: appData,
                collections: collectionData
            };
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(exportObj, null, 4)], { type: "application/json" }));
            a.download = "AppBox_Data.json"; a.click();
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        window.onload = init;
    </script>
</body>
</html>
